<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <title>Boda's Resume</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      embed {
        display: block;

        location.replace('/resume.pdf');
      }
    </script>
  </body>
